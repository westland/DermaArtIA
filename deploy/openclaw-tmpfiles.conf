# systemd-tmpfiles config for OpenClaw
# Ensures /tmp/openclaw and /tmp/openclaw-1000 exist at boot
# with correct ownership (clawuser uid=1000) and permissions (0700)
# so the systemd ReadWritePaths namespace setup succeeds.
d /tmp/openclaw      0700 clawuser clawuser -
d /tmp/openclaw-1000 0700 clawuser clawuser -
